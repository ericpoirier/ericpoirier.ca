<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" shape-rendering="crispEdges">

  <!-- Letter E — 7 cols × 10 rows, pixel=7, 2-unit strokes, origin (5,5) -->
  <!-- Top bar (rows 0-1): full width -->
  <rect x="5"  y="5"  width="49" height="14" fill="#222"/>
  <!-- Upper stem (rows 2-3): left 2 cols -->
  <rect x="5"  y="19" width="14" height="14" fill="#222"/>
  <!-- Mid bar (rows 4-5): 6 cols -->
  <rect x="5"  y="33" width="42" height="14" fill="#222"/>
  <!-- Lower stem (rows 6-7): left 2 cols -->
  <rect x="5"  y="47" width="14" height="14" fill="#222"/>
  <!-- Bottom bar (rows 8-9): full width -->
  <rect x="5"  y="61" width="49" height="14" fill="#222"/>

  <!-- Letter P — 7 cols × 10 rows, pixel=7, 2-unit strokes, origin (62,5) -->
  <!-- Top bar (rows 0-1): 6 cols -->
  <rect x="62" y="5"  width="42" height="14" fill="#222"/>
  <!-- Bowl left side (rows 2-3): 2 cols -->
  <rect x="62" y="19" width="14" height="14" fill="#222"/>
  <!-- Bowl right side (rows 2-3): 2 cols at col 5 -->
  <rect x="97" y="19" width="14" height="14" fill="#222"/>
  <!-- Bowl close (rows 4-5): 6 cols -->
  <rect x="62" y="33" width="42" height="14" fill="#222"/>
  <!-- Stem (rows 6-9): left 2 cols, 4 rows -->
  <rect x="62" y="47" width="14" height="28" fill="#222"/>
</svg>
